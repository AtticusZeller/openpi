# Run with (remote server should already be running serve_policy.py):
# REMOTE_HOST=<server_ip> docker compose -f examples/libero/compose.yml up --build
services:
  runtime:
    image: libero
    build:
      context: ../..
      dockerfile: examples/libero/Dockerfile
    init: true
    tty: true
    network_mode: host
    privileged: true
    volumes:
      - $PWD:/app
      - ../../data:/data
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    environment:
      - CLIENT_ARGS
      - REMOTE_HOST=${REMOTE_HOST:-0.0.0.0}
      - REMOTE_PORT=${REMOTE_PORT:-8000}
      - DISPLAY=$DISPLAY
      - MUJOCO_GL=${MUJOCO_GL:-egl}
      - MUJOCO_EGL_DEVICE_ID=0
      - NVIDIA_DRIVER_CAPABILITIES=all
      - PYOPENGL_PLATFORM=egl
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      bash -c "source /.venv/bin/activate &&
      python examples/libero/main.py --args.host $${REMOTE_HOST} --args.port $${REMOTE_PORT} $${CLIENT_ARGS}"
