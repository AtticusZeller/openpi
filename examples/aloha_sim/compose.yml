# Run with (remote server should already be running serve_policy.py):
# REMOTE_HOST=<server_ip> docker compose -f examples/aloha_sim/compose.yml up --build
services:
  runtime:
    image: aloha_sim
    build:
      context: ../..
      dockerfile: examples/aloha_sim/Dockerfile
    init: true
    tty: true
    network_mode: host
    privileged: true
    volumes:
      - $PWD:/app
      - ../../data:/data
    environment:
      - REMOTE_HOST=${REMOTE_HOST:-0.0.0.0}
      - REMOTE_PORT=${REMOTE_PORT:-8000}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      bash -c "source /.venv/bin/activate &&
      python examples/aloha_sim/main.py --args.host $${REMOTE_HOST} --args.port $${REMOTE_PORT}"
